[pytest]
testpaths = backend/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts = -v --tb=short
filterwarnings =
    error
    ignore:Since backends now support running jobs that contain both fractional gates and dynamic circuit.*:DeprecationWarning
    ignore:Use 'content=<...>' to upload raw bytes/text content\.:DeprecationWarning
markers =
    unit: Unit tests for individual functions
    integration: Integration tests for API endpoints
    contract: Contract tests to verify API compatibility
    regression: Regression tests for physics correctness (energy, observables)
